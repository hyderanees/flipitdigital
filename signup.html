<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create your account — FlipIt Digital</title>
  <meta name="description" content="Sign up for a free FlipIt Digital account to buy or sell digital assets with escrow protection. Verified members only." />
  <meta name="theme-color" content="#0A0E1A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=6" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' x2='1' y1='0' y2='1'%3E%3Cstop offset='0' stop-color='%236C5CE7'/%3E%3Cstop offset='1' stop-color='%2300E5FF'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='16' fill='url(%23g)'/%3E%3Cpath d='M32 14 L48 22 V36 C48 44 40 50 32 52 C24 50 16 44 16 36 V22 Z' fill='%23fff' fill-opacity='0.15' stroke='%23fff' stroke-width='2'/%3E%3Cpath d='M26 32 L30 36 L40 26' stroke='%23fff' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand"><span class="brand-logo"><svg viewBox="0 0 64 64" fill="none"><path d="M32 8 L52 18 V36 C52 46 42 54 32 56 C22 54 12 46 12 36 V18 Z" fill="white" fill-opacity=".15" stroke="white" stroke-width="3"/><path d="M24 32 L30 38 L42 24" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="brand-name"><b>FlipIt</b> <span>Digital</span></span></a>
      <div class="nav-actions" style="margin-left:auto;">
        <a href="login.html" class="btn btn-ghost btn-sm">Sign in</a>
      </div>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card reveal" style="max-width: 520px;">
      <h1>Create your account</h1>
      <p class="lead">Free forever. Verify your identity in 90 seconds.</p>

      <div class="oauth-row">
        <button class="oauth-btn"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.3c0-.8-.1-1.5-.2-2.3H12v4.4h5.9c-.3 1.4-1 2.5-2.2 3.3v2.7h3.5c2-1.9 3.3-4.7 3.3-8.1z"/><path fill="#34A853" d="M12 23c3 0 5.5-1 7.3-2.7l-3.5-2.7c-1 .7-2.3 1.1-3.7 1.1-2.9 0-5.3-1.9-6.2-4.5H2.2v2.8C4 20.7 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.8 14.2c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V7H2.2C1.4 8.5 1 10.2 1 12s.4 3.5 1.2 5l3.6-2.8z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3.1.6 4.2 1.6l3.1-3.1C17.5 2 15 1 12 1 7.7 1 4 3.3 2.2 7l3.6 2.8C6.7 7.3 9.1 5.4 12 5.4z"/></svg> Sign up with Google</button>
        <button class="oauth-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.6 17.5c-.6 1.3-.9 1.9-1.6 3-1 1.6-2.5 3.5-4.4 3.5-1.7 0-2.1-1.1-4.4-1-2.3 0-2.8 1-4.4 1-1.9 0-3.3-1.7-4.3-3.3-2.7-4.5-3-9.7-1.3-12.5C0.4 6.4 2.3 5 4 5c1.7-.1 3.3 1.1 4.4 1.1 1 0 3-1.4 5-1.2.8 0 3.1.4 4.6 2.5-4 2.4-3.5 8 1.6 10.1zM13 4c.5-1 .9-2.4.7-3.7-1.2.1-2.5.8-3.4 1.7-.7.9-1.3 2.2-1.1 3.6 1.4.1 2.8-.6 3.8-1.6z"/></svg> Sign up with Apple</button>
      </div>

      <div class="divider">or use email</div>

      <form>
        <div class="field-row">
          <div class="field"><label for="fname">First name</label><input id="fname" class="input" type="text" /></div>
          <div class="field"><label for="lname">Last name</label><input id="lname" class="input" type="text" /></div>
        </div>
        <div class="field"><label for="email">Email</label><input id="email" class="input" type="email" placeholder="you@example.com" /></div>
        <div class="field"><label for="password">Password</label><input id="password" class="input" type="password" placeholder="At least 12 characters" /></div>

        <div class="field" style="margin-top:8px;">
          <label>I want to...</label>
          <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:6px;">
            <label class="oauth-btn" style="cursor:pointer; padding:14px;"><input type="radio" name="role" checked style="display:none;"/><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h2l1 4h13l-2 8H7"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg> Buy</label>
            <label class="oauth-btn" style="cursor:pointer; padding:14px;"><input type="radio" name="role" style="display:none;"/><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 1 0 0 7H14a3.5 3.5 0 1 1 0 7H6"/></svg> Sell</label>
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" checked /> I agree to the <a href="terms.html" style="color:var(--cyan);">Terms</a> and <a href="privacy.html" style="color:var(--cyan);">Privacy Policy</a>
        </label>

        <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>

        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin:18px 0; font-size:11px; color:var(--text-3); text-align:center;">
          <div style="padding:8px; background:rgba(16,242,160,.06); border:1px solid rgba(16,242,160,.18); border-radius:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--emerald); display:inline; vertical-align:-3px;"><path d="M12 2L4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6l-8-4z"/></svg> Escrow</div>
          <div style="padding:8px; background:rgba(0,229,255,.06); border:1px solid rgba(0,229,255,.18); border-radius:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--cyan); display:inline; vertical-align:-3px;"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg> KYC</div>
          <div style="padding:8px; background:rgba(108,92,231,.06); border:1px solid rgba(108,92,231,.18); border-radius:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--primary-2); display:inline; vertical-align:-3px;"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Instant</div>
        </div>

        <p class="alt-link">Already have an account? <a href="login.html">Sign in</a></p>
      </form>
    </div>
  </main>

  <script src="assets/js/main.js?v=6" defer></script>
</body>
</html>
